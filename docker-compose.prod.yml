# =============================================================================
# AgroOps — docker-compose para producción (VPS Hostinger)
#
# Patrón inspirado en FitoLink prod (mismo VPS): app web bindeada a
# localhost, nginx del host actúa como reverse proxy + Let's Encrypt TLS
# para `agroops.systemrapid.io`.
#
# Servicios:
#   postgres    Postgres 16 + PostGIS 3.4 (puerto SRS 6170)
#   redis       Redis 7 (puerto SRS 6171)
#   web         Next.js 16 standalone (puerto SRS 3170 en host → 3000 contenedor)
#
# Postgres y Redis siguen bindeados a 127.0.0.1 (NO 0.0.0.0). Solo el
# host accede. El proxy nginx termina TLS y reenvía al puerto local.
#
# Uso en el VPS:
#   cd /opt/agroops
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#   docker compose -f docker-compose.prod.yml --env-file .env.production logs -f web
# =============================================================================

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: agroops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agroops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: agroops
    volumes:
      - agroops_pg_data:/var/lib/postgresql/data
      - ./scripts/db-init:/docker-entrypoint-initdb.d:ro
    ports:
      - '127.0.0.1:6170:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agroops -d agroops']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agroops-redis
    restart: unless-stopped
    volumes:
      - agroops_redis_data:/data
    ports:
      - '127.0.0.1:6171:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-AgroOps}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://agroops.systemrapid.io}
    image: agroops-web:latest
    container_name: agroops-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Connections internas — usan los nombres de servicio docker
      DATABASE_URL: postgresql://agroops:${POSTGRES_PASSWORD}@postgres:5432/agroops
      REDIS_URL: redis://redis:6379
      # Auth.js
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET required (openssl rand -base64 32)}
      AUTH_URL: ${AUTH_URL:-https://agroops.systemrapid.io}
      # Integraciones reales (pegar API keys en .env.production)
      AEMET_API_KEY: ${AEMET_API_KEY:-}
      ENAIRE_NOTAM_FEED: ${ENAIRE_NOTAM_FEED:-}
      # Facturación v1.0 manual default — Holded opt-in cuando se decida
      AGROOPS_INVOICING_MODE: ${AGROOPS_INVOICING_MODE:-manual}
      HOLDED_API_KEY: ${HOLDED_API_KEY:-}
      AGROOPS_PRICE_PER_HA_EUR: ${AGROOPS_PRICE_PER_HA_EUR:-25.00}
      AGROOPS_INVOICE_VAT_PCT: ${AGROOPS_INVOICE_VAT_PCT:-21}
      # Observabilidad
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      # Backup S3-compatible (opcional)
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_ACCESS_KEY: ${BACKUP_S3_ACCESS_KEY:-}
      BACKUP_S3_SECRET_KEY: ${BACKUP_S3_SECRET_KEY:-}
      BACKUP_GPG_RECIPIENT: ${BACKUP_GPG_RECIPIENT:-}
      # Version SHA del commit (lo inyecta el deploy script)
      AGROOPS_VERSION: ${AGROOPS_VERSION:-prod}
    volumes:
      # Storage persistente para PDFs albarán + backups locales
      - agroops_storage:/app/storage
    ports:
      - '127.0.0.1:3170:3000'

volumes:
  agroops_pg_data:
  agroops_redis_data:
  agroops_storage:
