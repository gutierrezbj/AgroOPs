# =============================================================================
# nginx server block — agroops.systemrapid.io
#
# Copiar a /etc/nginx/sites-available/agroops.systemrapid.io.conf en el VPS,
# crear symlink en sites-enabled, y reload nginx.
#
# Asume:
#  - Let's Encrypt cert ya emitido para agroops.systemrapid.io
#    (certbot --nginx -d agroops.systemrapid.io)
#  - El contenedor web está en 127.0.0.1:3170 (convención SRS offset +170)
#  - El mismo VPS sirve fitolink.systemrapid.io (otro server block)
#
# Test antes de reload: sudo nginx -t
# =============================================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name agroops.systemrapid.io;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — reverse proxy a Next.js standalone en 127.0.0.1:3170
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name agroops.systemrapid.io;

    # TLS Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/agroops.systemrapid.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agroops.systemrapid.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Headers de seguridad básicos
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Body máximo (PDFs albarán pueden pesar ~300KB con firma)
    client_max_body_size 4M;

    # Logs separados por dominio
    access_log /var/log/nginx/agroops.access.log;
    error_log  /var/log/nginx/agroops.error.log;

    # Reverse proxy al contenedor Next.js standalone
    location / {
        proxy_pass         http://127.0.0.1:3170;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # /api/health expuesto SIN auth (healthcheckers externos)
    # Override del middleware proxy de Next 16 (bug 307 si fuera privado)
    location = /api/health {
        proxy_pass         http://127.0.0.1:3170/api/health;
        proxy_set_header   Host $host;
        access_log         off;  # no inundar logs con Uptime Robot pings
    }
}
